<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>team-vault — 초대 전용</title>
  <meta name="description" content="team-vault — 초대된 분만 입장하실 수 있습니다.">
  <meta name="theme-color" content="#0b0a12">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c3aed'/%3E%3Cstop offset='1' stop-color='%234f46e5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ccircle cx='32' cy='18' r='5' fill='%23fff'/%3E%3Ccircle cx='18' cy='42' r='5' fill='%23fff'/%3E%3Ccircle cx='46' cy='42' r='5' fill='%23fff'/%3E%3Cpath d='M32 18L18 42M32 18L46 42M18 42L46 42' stroke='%23fff' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">

<body>
  <main class="gate-wrap">
    <div class="gate-box">
      <p class="hero-kicker">TEAM OPERATING SYSTEM ON OBSIDIAN</p>
      <h1><span class="grad-text">team-vault</span></h1>
      <p class="gate-lead">초대된 분만 입장하실 수 있습니다.</p>
      <form id="gate-form" autocomplete="off">
        <label class="gate-label" for="gate-input">인증 코드를 입력하세요</label>
        <input id="gate-input" name="code" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" aria-describedby="gate-status" placeholder="예: TV-XXXXXX">
        <button type="submit" class="gate-btn">입장</button>
      </form>
      <p id="gate-status" class="gate-status" role="status" aria-live="polite"></p>
    </div>
  </main>
  <script src="codes.js"></script>
  <script src="gate.js"></script>
</body>
</html>
